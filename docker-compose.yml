# Local Postgres with the pgvector extension, used as Sherlog's vector store
# for retrieving similar historical incidents, runbooks, and code context.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sherlog-postgres
    environment:
      POSTGRES_USER: sherlog
      POSTGRES_PASSWORD: sherlog
      POSTGRES_DB: sherlog
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sherlog -d sherlog"]
      interval: 5s
      timeout: 5s
      retries: 5
